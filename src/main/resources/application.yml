server:
  port: ${SERVER_PORT:8089}

spring:
  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 5MB
  boot:
    docker:
      compose:
        enabled: false
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/test_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:root}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    database: postgresql
    database-platform: PostgreSQLDialect

  mail:
    protocol: smtp
    port: 587
    host: smtp.gmail.com
    username: ${MAIL_USERNAME:jha708785@gmail.com}
    password: ${MAIL_PASSWORD:wcle bnbr tyzi skae}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  output:
    ansi:
      enabled: always


# The admin username and password are used to create the admin account when the application starts.
admin:
  username: ${ADMIN_USERNAME:kumars@gmail.com}
  password: ${ADMIN_PASSWORD:SUMIT}


